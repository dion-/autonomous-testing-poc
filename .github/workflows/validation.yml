name: App Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches-ignore:
      - "auto-fix/**"

env:
  BOMBADIL_TIME_LIMIT: ${{ vars.BOMBADIL_TIME_LIMIT || '10m' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (oxlint)
        run: pnpm run lint:ci

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (tsc)
        run: pnpm run typecheck

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests with coverage
        run: pnpm run test:coverage

  bombadil:
    name: Bombadil Fuzzy Test
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Start preview server
        run: |
          pnpm exec vite preview --port 4173 --host &
          npx wait-on http://localhost:4173

      - name: Install Chromium
        run: |
          npx -y playwright install chromium
          CHROME_PATH="$(find ~/.cache/ms-playwright -name chrome -type f | head -1)"
          sudo ln -sf "$CHROME_PATH" /usr/bin/google-chrome-stable
          echo "Using Chromium at $CHROME_PATH"
        shell: bash

      - name: Run Bombadil
        run: |
          npx bombadil test http://localhost:4173 \
            --headless \
            --no-sandbox \
            --exit-on-violation \
            --time-limit "$BOMBADIL_TIME_LIMIT" \
            --output-path ./bombadil-results
        shell: bash

      - name: Upload Bombadil results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bombadil-results
          path: bombadil-results/

      - name: Run Flue Agent to Diagnose
        if: failure()
        id: flue
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          npx flue run analyze-violation --target node --id ci-bombadil-$GITHUB_RUN_ID
        shell: bash

  uat:
    name: UAT — Playwright
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm run build

      - name: Start preview server
        run: |
          pnpm exec vite preview --port 4173 --host &
          npx wait-on http://localhost:4173

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Extract PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- src/ > flue-diff.txt 2>/dev/null || true

      - name: Run Flue UAT Agent
        id: flue-uat
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          npx flue run uat --target node --id ci-uat-$GITHUB_RUN_ID
        shell: bash

      - name: Post UAT comment with embedded media
        if: always() && github.event.pull_request.number
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          node -e '
          const fs = require("fs");
          const path = require("path");
          const { execSync } = require("child_process");

          const commentFile = "flue-comment.md";
          if (!fs.existsSync(commentFile)) {
            console.log("No flue-comment.md found; skipping comment.");
            process.exit(0);
          }

          let comment = fs.readFileSync(commentFile, "utf8");

          function collectFiles(dir, ext) {
            const results = [];
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const full = path.join(dir, entry.name);
              if (entry.isDirectory()) {
                results.push(...collectFiles(full, ext));
              } else if (entry.name.endsWith(ext)) {
                results.push(full);
              }
            }
            return results;
          }

          const screenshots = fs.existsSync("test-results") ? collectFiles("test-results", ".png").sort() : [];
          const videos = fs.existsSync("test-results") ? collectFiles("test-results", ".webm").sort() : [];

          async function uploadFile(filePath) {
            const repo = process.env.REPO;
            const token = process.env.GH_TOKEN;
            const response = execSync(
              `curl -s -X POST -H "Accept: application/json" -H "Authorization: token ${token}" -F "file=@${filePath}" "https://uploads.github.com/repos/${repo}/issues/files"`,
              { encoding: "utf8", maxBuffer: 10 * 1024 * 1024 }
            );
            try {
              const json = JSON.parse(response);
              return json.href || null;
            } catch {
              console.error("Upload failed for", filePath, response);
              return null;
            }
          }

          async function main() {
            if (screenshots.length > 0) {
              comment += "\n\n### Screenshots\n";
              for (const img of screenshots) {
                const url = await uploadFile(img);
                if (url) {
                  comment += `\n![${path.basename(img)}](${url})`;
                }
              }
            }

            if (videos.length > 0) {
              comment += "\n\n### Videos\n";
              for (const vid of videos) {
                const url = await uploadFile(vid);
                if (url) {
                  comment += `\n\n<video src="${url}" controls width="100%"></video>`;
                }
              }
            }

            const finalFile = "flue-comment-final.md";
            fs.writeFileSync(finalFile, comment);
            execSync(
              `gh pr comment ${process.env.PR_NUMBER} --repo ${process.env.REPO} --body-file ${finalFile}`,
              { stdio: "inherit", env: { ...process.env, GH_TOKEN: process.env.GH_TOKEN } }
            );
          }

          main().catch(err => {
            console.error(err);
            process.exit(1);
          });
          '
        shell: bash

      - name: Upload UAT artifacts
        uses: actions/upload-artifact@v4
        with:
          name: uat-results
          path: |
            test-results/
            playwright-report/
            flue-comment.md
            flue-result.json
